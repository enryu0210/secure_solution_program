<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SME Security Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* AI 마크다운 리포트를 예쁘게 보여주기 위한 커스텀 스타일 */
        .markdown-body h1 { font-size: 1.5rem; font-weight: bold; margin-bottom: 0.5rem; color: #1f2937; }
        .markdown-body h2 { font-size: 1.25rem; font-weight: bold; margin-top: 1rem; margin-bottom: 0.5rem; color: #374151; }
        .markdown-body h3 { font-size: 1.1rem; font-weight: bold; margin-top: 1rem; margin-bottom: 0.5rem; color: #4b5563; }
        .markdown-body p { margin-bottom: 0.75rem; line-height: 1.6; color: #4b5563; }
        .markdown-body ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; color: #4b5563; }
        .markdown-body strong { color: #111827; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-indigo-600 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <span class="font-bold text-xl tracking-tight">ShieldX Dashboard</span>
                </div>
                <div>
                    <span class="text-sm bg-indigo-500 px-3 py-1 rounded-full" id="status-badge">서버 연결 대기 중...</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow p-6 border-l-4 border-indigo-500">
                <h3 class="text-sm font-medium text-gray-500 uppercase tracking-wider">연결된 에이전트</h3>
                <p class="mt-2 text-3xl font-bold text-gray-900" id="total-agents">0</p>
            </div>
            <div class="bg-white rounded-lg shadow p-6 border-l-4 border-yellow-400">
                <h3 class="text-sm font-medium text-gray-500 uppercase tracking-wider">탐지된 위험 요소</h3>
                <p class="mt-2 text-3xl font-bold text-gray-900">-</p>
            </div>
            <div class="bg-white rounded-lg shadow p-6 border-l-4 border-green-500">
                <h3 class="text-sm font-medium text-gray-500 uppercase tracking-wider">시스템 상태</h3>
                <p class="mt-2 text-3xl font-bold text-green-600">안정</p>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-200 bg-gray-50 flex justify-between items-center">
                <h2 class="text-lg font-bold text-gray-800">에이전트 보안 리포트</h2>
                <button onclick="fetchDashboardData()" class="text-sm bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 py-1 px-3 rounded shadow-sm transition">
                    🔄 새로고침
                </button>
            </div>
            
            <div id="agent-container" class="divide-y divide-gray-200">
                <div class="p-6 text-center text-gray-500">데이터를 불러오는 중입니다...</div>
            </div>
        </div>
    </main>

    <script>
        // 하드코딩된 주소 대신 상대 경로 사용 (서버 배포 시 유리함)
        const API_URL = "/api/v1/dashboard";
        let autoRefreshInterval = null;

        async function fetchDashboardData() {
            const statusBadge = document.getElementById('status-badge');
            
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("서버 응답 오류");
                
                const data = await response.json();
                
                document.getElementById('total-agents').innerText = data.total_connected_agents;
                statusBadge.innerText = "● 온라인";
                statusBadge.className = "text-sm bg-green-500 px-3 py-1 rounded-full text-white";

                renderAgents(data.agents);
                checkIfAnalysisPending(data.agents);
                
            } catch (error) {
                console.error("데이터 통신 오류:", error);
                statusBadge.innerText = "서버 연결 실패";
                statusBadge.className = "text-sm bg-red-500 px-3 py-1 rounded-full text-white";
            }
        }

        function renderAgents(agentsData) {
            const container = document.getElementById('agent-container');
            container.innerHTML = ""; 

            const agentKeys = Object.keys(agentsData);
            
            if (agentKeys.length === 0) {
                container.innerHTML = `<div class="p-6 text-center text-gray-500">연결된 에이전트가 없습니다.</div>`;
                return;
            }

            agentKeys.forEach(machineId => {
                const agent = agentsData[machineId];
                const isAnalyzing = agent.ai_analysis === "분석 중...";
                
                // 분석 중일 때는 애니메이션을, 완료되었을 때는 마크다운 렌더링을 적용
                const aiReportHtml = isAnalyzing 
                    ? `<div class="text-indigo-600 font-medium animate-pulse flex items-center gap-2">
                         <svg class="animate-spin h-5 w-5 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                         AI가 보안 로그를 딥러닝 분석 중입니다...
                       </div>`
                    : marked.parse(agent.ai_analysis);

                const badgeHtml = isAnalyzing
                    ? `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800">분석 진행 중</span>`
                    : `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-indigo-100 text-indigo-800">분석 완료</span>`;

                const cardHtml = `
                    <div class="p-6 hover:bg-gray-50 transition">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-xl font-bold text-gray-900 flex items-center gap-2">💻 ${machineId}</h3>
                                <p class="text-sm text-gray-500 mt-1">마지막 스캔: ${agent.last_updated}</p>
                            </div>
                            ${badgeHtml}
                        </div>
                        <div class="bg-indigo-50/50 rounded p-5 border border-indigo-100 mt-4">
                            <h4 class="text-sm font-bold text-indigo-900 mb-3 flex items-center gap-2">✨ AI 보안 취약점 진단</h4>
                            <div class="markdown-body text-sm">${aiReportHtml}</div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        }

        // 분석 중인 에이전트가 있는지 확인하고 자동 새로고침을 켜고 끄는 로직
        function checkIfAnalysisPending(agentsData) {
            const isAnyAnalyzing = Object.values(agentsData).some(agent => agent.ai_analysis === "분석 중...");
            
            if (isAnyAnalyzing && !autoRefreshInterval) {
                // 분석 중인 건이 있으면 3초마다 데이터를 갱신
                autoRefreshInterval = setInterval(fetchDashboardData, 3000);
            } else if (!isAnyAnalyzing && autoRefreshInterval) {
                // 모두 분석이 끝났으면 불필요한 트래픽을 막기 위해 갱신 중지
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
            }
        }

        window.addEventListener('DOMContentLoaded', fetchDashboardData);
    </script>
</body>
</html>
